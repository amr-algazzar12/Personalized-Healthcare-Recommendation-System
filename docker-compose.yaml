version: "3"

# =============================================================================
# docker-compose.yaml
# Personalized Healthcare Recommendation System — full cluster stack.
#
# This is a self-contained file derived from mrugankray/Big-Data-Cluster.
# Unused services (Hue, huedb, Cassandra, Kafka, Flume, Zeppelin) are removed.
# All credentials match the original mrugankray cluster exactly.
#
# Start with:
#   docker-compose up -d
#
# Services included (10):
#   namenode, datanode, resourcemanager, nodemanager, historyserver,
#   hive-server, hive-metastore, hive-metastore-postgresql,
#   external_postgres_db, external_pgadmin
#
# Project additions (2) — built from ./docker/:
#   mlflow, app
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # HDFS NameNode + Spark + Airflow + MiniConda
  # All four live inside this single container.
  # ---------------------------------------------------------------------------
  namenode:
    image: mrugankray/namenode-spark-airflow-flume-zepplin:1.1
    container_name: namenode
    restart: always
    ports:
      - "9870:9870"    # HDFS NameNode UI
      - "9000:9000"    # HDFS RPC
      - "8080:8080"    # Spark Master UI
      - "8081:8081"    # Spark Worker UI
      - "4040:4040"    # Spark Driver UI (active during jobs)
      - "3000:3000"    # Airflow UI
    volumes:
      # --- Cluster volumes (from original) ---
      - hadoop_namenode:/hadoop/dfs/name
      - hadoop_namenode_conda:/root/anaconda
      - hadoop_namenode_spark:/opt/spark
      - airflow_namenode:/root/airflow
      # --- Config overrides ---
      - ./configs/namenode_bashrc.txt:/root/.bashrc
      - ./configs/namenode_airflow.cfg:/root/airflow/airflow.cfg
      # --- DAGs (Airflow reads from here) ---
      - ./dags:/root/airflow/dags
      # --- Project code and data (volume-mounted for Spark jobs) ---
      - ./src:/home/src
      - ./data/raw:/home/data/raw
      - ./models:/home/models
      - ./conda:/home/conda
      - ./scripts:/home/scripts
      # --- Shared MLflow artifact store ---
      - mlflow_artifacts:/home/mlflow_artifacts
    environment:
      - CLUSTER_NAME=hadoop-learning
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      # Replication factor = 1 (single datanode — must be set on both
      # namenode and datanode or HDFS will report under-replicated blocks)
      - HDFS_CONF_dfs_replication=1
      - HDFS_CONF_dfs_namenode_replication_min=1
      # PySpark must use the conda env Python, not the system Python
      - PYSPARK_PYTHON=/root/anaconda/envs/healthcare-rec/bin/python
      - PYSPARK_DRIVER_PYTHON=/root/anaconda/envs/healthcare-rec/bin/python
      # MLflow tracking URI — points to the mlflow service on Docker network
      - MLFLOW_TRACKING_URI=http://mlflow:5001
    env_file:
      - ./hadoop.env

  # ---------------------------------------------------------------------------
  # HDFS DataNode
  # ---------------------------------------------------------------------------
  datanode:
    image: mrugankray/datanode-python:1.0
    container_name: datanode
    restart: always
    volumes:
      - hadoop_datanode:/hadoop/dfs/data
      - hadoop_datanode_conda:/root/anaconda
    environment:
      SERVICE_PRECONDITION: "namenode:9870"
      CORE_CONF_fs_defaultFS: "hdfs://namenode:9000"
      # Replication factor = 1 because we have a single datanode.
      # Without this the namenode marks all blocks as under-replicated
      # and HDFS writes will fail or stall.
      HDFS_CONF_dfs_replication: "1"
      HDFS_CONF_dfs_datanode_use_datanode_hostname: "false"
    ports:
      - "9864:9864"
    env_file:
      - ./hadoop.env

  # ---------------------------------------------------------------------------
  # YARN ResourceManager
  # ---------------------------------------------------------------------------
  resourcemanager:
    image: mrugankray/resourcemanager-python:1.0
    container_name: resourcemanager
    restart: always
    volumes:
      - hadoop_resourcemanager_conda:/root/anaconda
    environment:
      SERVICE_PRECONDITION: "namenode:9000 namenode:9870 datanode:9864"
    ports:
      - "8088:8088"
    env_file:
      - ./hadoop.env

  # ---------------------------------------------------------------------------
  # YARN NodeManager — executes Spark tasks
  # ---------------------------------------------------------------------------
  nodemanager:
    image: mrugankray/nodemanager-python:1.0
    container_name: nodemanager
    restart: always
    volumes:
      - hadoop_nodemanager_conda:/root/anaconda
    environment:
      SERVICE_PRECONDITION: "namenode:9000 namenode:9870 datanode:9864 resourcemanager:8088"
    ports:
      - "8042:8042"
      - "19888:19888"   # Job History access
    env_file:
      - ./hadoop.env

  # ---------------------------------------------------------------------------
  # Hadoop History Server — Spark/YARN job logs
  # ---------------------------------------------------------------------------
  historyserver:
    image: bde2020/hadoop-historyserver:2.0.0-hadoop3.2.1-java8
    container_name: historyserver
    restart: always
    environment:
      SERVICE_PRECONDITION: "namenode:9000 namenode:9870 datanode:9864 resourcemanager:8088"
    ports:
      - "8188:8188"
    volumes:
      - hadoop_historyserver:/hadoop/yarn/timeline
    env_file:
      - ./hadoop.env

  # ---------------------------------------------------------------------------
  # Hive Server (Hive 2.3.2 + Sqoop + SSH server)
  # SSHOperator in Airflow connects here to run beeline commands.
  # ---------------------------------------------------------------------------
  hive-server:
    image: mrugankray/hive-server-sqoop:1.0
    container_name: hive-server
    restart: always
    depends_on:
      - namenode
      - datanode
      - hive-metastore
    volumes:
      - hadoop_hive_server_sqoop:/usr/lib/sqoop
      # Mount src so HQL files are accessible via the volume
      - ./src:/home/src
    environment:
      HIVE_CORE_CONF_javax_jdo_option_ConnectionURL: "jdbc:postgresql://hive-metastore/metastore"
      SERVICE_PRECONDITION: "hive-metastore:9083"
    ports:
      - "10000:10000"
    env_file:
      - ./hadoop.env

  # ---------------------------------------------------------------------------
  # Hive Metastore service
  # ---------------------------------------------------------------------------
  hive-metastore:
    image: bde2020/hive:2.3.2-postgresql-metastore
    container_name: hive-metastore
    restart: always
    depends_on:
      - hive-metastore-postgresql
    command: /opt/hive/bin/hive --service metastore
    environment:
      SERVICE_PRECONDITION: "namenode:9000 namenode:9870 datanode:9864 hive-metastore-postgresql:5432"
    ports:
      - "9083:9083"
    env_file:
      - ./hadoop.env

  # ---------------------------------------------------------------------------
  # Hive Metastore PostgreSQL backend
  # INTERNAL ONLY — never reference this from application code.
  # ---------------------------------------------------------------------------
  hive-metastore-postgresql:
    image: bde2020/hive-metastore-postgresql:2.3.0
    container_name: hive-metastore-postgresql
    restart: always

  # ---------------------------------------------------------------------------
  # External PostgreSQL — used by Airflow metadata DB, MLflow backend, and app.
  # Credentials are EXACTLY as defined in the original mrugankray cluster.
  # ---------------------------------------------------------------------------
  external_postgres_db:
    image: postgres:15.1-alpine3.17
    container_name: external_postgres_db
    restart: always
    volumes:
      - external_postgres_db_data:/var/lib/postgresql/data/
      # Init script creates the airflow and mlflow databases on first boot
      - ./configs/postgres_init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: external
      POSTGRES_PASSWORD: external
      POSTGRES_DB: external

  # ---------------------------------------------------------------------------
  # pgAdmin 4 — inspect both Postgres instances
  # Credentials match the original mrugankray cluster exactly.
  # ---------------------------------------------------------------------------
  external_pgadmin:
    image: dpage/pgadmin4:6.18
    container_name: external_pgadmin
    restart: always
    ports:
      - "5000:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=pgadmin@xyz.com
      - PGADMIN_DEFAULT_PASSWORD=external
    depends_on:
      - external_postgres_db

  # ---------------------------------------------------------------------------
  # MLflow tracking server — your addition
  # ---------------------------------------------------------------------------
  mlflow:
    build:
      context: ./docker/mlflow
      dockerfile: Dockerfile
    container_name: mlflow
    restart: always
    ports:
      - "5001:5001"
    volumes:
      - mlflow_artifacts:/home/mlflow_artifacts
    environment:
      # Uses the external_postgres_db with the correct credentials
      MLFLOW_BACKEND_STORE_URI: postgresql://external:external@external_postgres_db:5432/mlflow
      MLFLOW_ARTIFACT_ROOT: /home/mlflow_artifacts
    depends_on:
      - external_postgres_db
    command: >
      mlflow server
      --backend-store-uri postgresql://external:external@external_postgres_db:5432/mlflow
      --default-artifact-root /home/mlflow_artifacts
      --host 0.0.0.0
      --port 5001

  # ---------------------------------------------------------------------------
  # Flask API + Streamlit dashboard — your addition
  # ---------------------------------------------------------------------------
  app:
    build:
      context: ./docker/app
      dockerfile: Dockerfile
    container_name: app
    restart: always
    ports:
      - "5050:5050"    # Flask REST API
      - "8501:8501"    # Streamlit dashboard
    volumes:
      - ./src:/home/src
      - ./models:/home/models
      - mlflow_artifacts:/home/mlflow_artifacts
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5001
      FLASK_ENV: development
      FLASK_PORT: "5050"
      PYTHONPATH: /home/src
    depends_on:
      - mlflow
    command: >
      bash -c "python /home/src/api/app.py &
               streamlit run /home/src/dashboard/app.py
               --server.port 8501
               --server.address 0.0.0.0"

# =============================================================================
# Named volumes — matching the original mrugankray cluster exactly
# plus the two project additions
# =============================================================================
volumes:
  hadoop_namenode:
  hadoop_namenode_conda:
  hadoop_namenode_spark:
  hadoop_datanode:
  hadoop_datanode_conda:
  hadoop_resourcemanager_conda:
  hadoop_nodemanager_conda:
  hadoop_historyserver:
  hadoop_hive_server_sqoop:
  external_postgres_db_data:
  airflow_namenode:
  mlflow_artifacts:        # shared between namenode and mlflow containers