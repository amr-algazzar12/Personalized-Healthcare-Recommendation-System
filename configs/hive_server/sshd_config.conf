# sshd_config.conf
# Mounted into hive-server at /etc/ssh/sshd_config
# Enables SSH access so Airflow SSHOperator can connect and run beeline commands.

Port 22
PermitRootLogin yes
PasswordAuthentication yes
PubkeyAuthentication yes
AuthorizedKeysFile .ssh/authorized_keys
PrintMotd no
AcceptEnv LANG LC_*
Subsystem sftp /usr/lib/openssh/sftp-server