[core]
dags_folder = /root/airflow/dags
base_log_folder = /root/airflow/logs
logging_level = INFO
executor = LocalExecutor
parallelism = 4
max_active_tasks_per_dag = 4
max_active_runs_per_dag = 1
load_examples = False
default_timezone = UTC

[database]
# Points to external_postgres_db — NOT the hive-metastore-postgresql.
# Credentials MUST match the compose file: user=external, password=external, db=airflow
sql_alchemy_conn = postgresql+psycopg2://external:external@external_postgres_db:5432/airflow
sql_engine_encoding = utf-8
sql_alchemy_pool_size = 5
sql_alchemy_max_overflow = 10

[webserver]
web_server_host = 0.0.0.0
web_server_port = 3000
secret_key = healthcare_rec_secret_change_in_prod
workers = 2
worker_refresh_batch_size = 1
authenticate = False
expose_config = True

[scheduler]
scheduler_heartbeat_sec = 5
min_file_process_interval = 30
dag_dir_list_interval = 30
catchup_by_default = False
max_threads = 2

[logging]
base_log_folder = /root/airflow/logs
dag_processor_manager_log_location = /root/airflow/logs/dag_processor_manager/dag_processor_manager.log